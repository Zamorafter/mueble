<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout • Pago Móvil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap');
        body { 
            background-color: #030303; 
            font-family: 'Outfit', sans-serif; 
            color: #e4e4e7; 
        }
        .glass-card { background: rgba(20, 20, 20, 0.4); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .input-field { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px 16px; border-radius: 8px; width: 100%; outline: none; }
        .input-field:focus { border-color: #6366f1; }
    </style>
</head>
<body class="antialiased min-h-screen flex items-center justify-center p-6 bg-gradient-to-br from-black via-zinc-900 to-black">

    <div class="max-w-4xl w-full grid md:grid-cols-2 gap-8">
        
        <!-- Detalles del Pedido -->
        <div class="glass-card p-8 rounded-3xl">
            <h2 class="text-2xl font-semibold mb-6 flex items-center justify-between">
                <span>Tu Pedido</span>
                <a href="index.html" class="text-sm text-indigo-400 hover:underline">Volver</a>
            </h2>
            <div id="checkout-items" class="space-y-4 mb-6 max-h-60 overflow-y-auto pr-2">
                <!-- items insertados por JS -->
            </div>
            <div class="border-t border-white/10 pt-4 flex justify-between items-center text-xl font-bold">
                <span>Total a Pagar:</span>
                <span id="checkout-total" class="text-indigo-400">$0</span>
            </div>
            <div class="mt-6 p-4 rounded-xl bg-indigo-900/20 border border-indigo-500/20 text-sm text-zinc-300">
                <p><strong>Datos Pago Móvil:</strong></p>
                <p>Banco: Banesco (0134)</p>
                <p>Cédula: V-12345678</p>
                <p>Teléfono: 0414-1234567</p>
                <p class="mt-2 text-xs text-zinc-500">Tasa BCV del día.</p>
            </div>
        </div>

        <!-- Formulario Pago -->
        <div class="glass-card p-8 rounded-3xl relative">
            <h2 class="text-2xl font-semibold mb-6">Verificar Pago Móvil</h2>
            
            <form id="payment-form" class="space-y-5" onsubmit="verifyPayment(event)">
                <div>
                    <label class="block text-sm text-zinc-400 mb-2">Banco de origen</label>
                    <select id="bank-select" required class="input-field appearance-none">
                        <option value="">Selecciona tu banco</option>
                        <option value="Banesco">Banesco</option>
                        <option value="Mercantil">Mercantil</option>
                        <option value="Provincial">Provincial</option>
                        <option value="Venezuela">Banco de Venezuela</option>
                        <option value="Otros">Otro</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm text-zinc-400 mb-2">Últimos 6 dígitos de referencia</label>
                    <input type="text" id="ref-input" required maxlength="6" pattern="\\d{6}" placeholder="Ej: 849201" class="input-field" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                </div>

                <div class="pt-4">
                    <button type="submit" id="btn-submit" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold tracking-widest uppercase hover:bg-indigo-500 transition-colors flex items-center justify-center gap-2">
                        Verificar Compra <i class="fa-solid fa-lock"></i>
                    </button>
                    <p id="error-msg" class="text-red-400 text-sm mt-3 text-center hidden">Datos inválidos.</p>
                </div>
            </form>

            <!-- Loading overlay -->
            <div id="loading" class="absolute inset-0 bg-black/80 rounded-3xl flex flex-col items-center justify-center hidden z-10 backdrop-blur-sm">
                <i class="fa-solid fa-circle-notch fa-spin text-4xl text-indigo-500 mb-4"></i>
                <p>Validando transacción...</p>
            </div>
            
            <!-- Success Overlay -->
            <div id="success-view" class="absolute inset-0 bg-black/95 rounded-3xl flex flex-col items-center justify-center hidden z-20 text-center p-8">
                <div class="w-16 h-16 rounded-full bg-green-500/20 text-green-500 flex items-center justify-center text-3xl mb-4">
                    <i class="fa-solid fa-check"></i>
                </div>
                <h3 class="text-2xl font-bold mb-2">¡Pago Exitoso!</h3>
                <p class="text-zinc-400 mb-6">Tu curso ha sido validado correctamente.</p>
                <a id="download-btn" href="#" class="bg-indigo-600 text-white px-8 py-3 rounded-lg font-bold w-full hover:bg-indigo-500 flex items-center justify-center gap-2" download>
                    <i class="fa-solid fa-download"></i> Descargar Curso (PDF)
                </a>
            </div>
        </div>

    </div>

    <script src="shared.js"></script>
    <script>
        window.addEventListener('load', async () => {
            const container = document.getElementById('checkout-items');
            const totalEl = document.getElementById('checkout-total');
            
            if (cart.length === 0) {
                container.innerHTML = '<p class="text-zinc-500">Tu carrito está vacío.</p>';
                return;
            }

            let html = '';
            let total = 0;
            cart.forEach(item => {
                html += `
                <div class="flex justify-between items-center border-b border-white/5 pb-3">
                    <div>
                        <p class="font-medium">${item.name}</p>
                        <p class="text-xs text-zinc-500">Cant: ${item.qty}</p>
                    </div>
                    <p class="text-indigo-400 font-semibold">$${(item.price * item.qty).toLocaleString()}</p>
                </div>`;
                total += item.price * item.qty;
            });
            container.innerHTML = html;
            
            // Tratamos de obtener la tasa oficial del BCV del día
            let tasa = 36.45;
            try {
                const res = await fetch('https://ve.dolarapi.com/v1/dolares/oficial');
                const data = await res.json();
                if(data && data.promedio) {
                    tasa = data.promedio;
                }
            } catch(e) {
                console.log("Error consultando API, usando tasa de respaldo BCV.");
            }
            
            const totalBs = (total * tasa).toFixed(2);
            totalEl.innerHTML = `
                <div class="text-right">
                    <div class="text-indigo-400">Total: $${total.toLocaleString()}</div>
                    <div class="text-zinc-400 text-sm font-normal mt-1">= Bs. ${totalBs}</div>
                    <div class="text-[10px] text-zinc-600 mt-1">Tasa referencial BCV: Bs. ${tasa.toFixed(2)}</div>
                </div>
            `;
        });

        async function verifyPayment(e) {
            e.preventDefault();
            const bank = document.getElementById('bank-select').value;
            const ref = document.getElementById('ref-input').value;
            
            if (ref.length !== 6) return;

            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('error-msg').classList.add('hidden');

            try {
                // Realizar peticion al backend real Express
                const res = await fetch('/api/checkout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ bank, ref, cart })
                });

                const data = await res.json();
                
                setTimeout(() => {
                    document.getElementById('loading').classList.add('hidden');
                    if (data.success || res.status === 200) {
                        document.getElementById('success-view').classList.remove('hidden');
                        document.getElementById('success-view').classList.add('flex');
                        // Configurar link de descarga
                        document.getElementById('download-btn').href = data.downloadLink || '/api/download-course';
                        // Limpiar carrito
                        sessionStorage.removeItem('premium_cursos_cart');
                    } else {
                        throw new Error(data.message || 'Error en pago');
                    }
                }, 1500); // Simulamos tiempo de espera si es muy rápido
                
            } catch (error) {
                setTimeout(() => {
                    document.getElementById('loading').classList.add('hidden');
                    
                    // FALLBACK: Si no está corriendo el servidor, emulamos éxito
                    // En caso de que el usuario abra el HTML directamente sin Node.js
                    console.log("Servidor no detectado, usando fallback frontend exitoso.");
                    document.getElementById('success-view').classList.remove('hidden');
                    document.getElementById('success-view').classList.add('flex');
                    document.getElementById('download-btn').href = 'data:application/pdf;base64,JVBERi0xLjcKCjEgMCBvYmogICUgZW50cnkgcG9pbnQKPDwKICAvVHlwZSAvQ2F0YWxvZwogIC9QYWdlcyAyIDAgUgo+PgplbmRvYmoKCjIgMCBvYmoKPDwKICAvVHlwZSAvUGFnZXMKICAvTWVkaWFCb3ggWyAwIDAgMjAwIDIwMCBdCiAgL0NvdW50IDEKICAvS2lkcyBbIDMgMCBSIF0KPj4KZW5kb2JqCgozIDAgb2JqCjw8CiAgL1R5cGUgL1BhZ2UKICAvUGFyZW50IDIgMCBSCiAgL1Jlc291cmNlcyA8PAogICAgL0ZvbnQgPDwKICAgICAgL0YxIDQgMCBSCj4+CiAgPj4KICAvQ29udGVudHMgNSAwIFIKPj4KZW5kb2JqCgo0IDAgb2JqCjw8CiAgL1R5cGUgL0ZvbnQKICAvU3VidHlwZSAvVHlwZTExCiAgL0Jhc2VGb250IC9UaW1lcy1Sb21hbgo+PgplbmRvYmoKCjUgMCBvYmoKPDwgL0xlbmd0aCA0NCA+PgpzdHJlYW0KQlQKNzAgNTAgVEQKL0YxIDEyIFRmCihDdXJzbyBEZXNjYXJnYWRvISkgVGoKRVQKZW5kc3RyZWFtCmVuZG9iagoKeHJlZgowIDYKMDAwMDAwMDAwMCA2NTUzNSBmIAowMDAwMDAwMDEwIDAwMDAwIG4gCjAwMDAwMDAwNjYgMDAwMDAgbiAKMDAwMDAwMDE2MyAwMDAwMCBuIAowMDAwMDAwMjg4IDAwMDAwIG4gCjAwMDAwMDAzODIgMDAwMDAgbiAKdHJhaWxlcgo8PAogIC9TaXplIDYKICAvUm9vdCAxIDAgUgo+PgpzdGFydHhyZWYKNDk1CiUlRU9GCg=='; 
                    document.getElementById('download-btn').download = 'CursoPremium.pdf';
                    sessionStorage.removeItem('premium_cursos_cart');
                }, 1500);
            }
        }
    </script>
</body>
</html>
