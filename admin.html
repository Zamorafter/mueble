<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobalTrade Academy • Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Outfit:wght@300;400;500;600&display=swap');
        body { background-color:#030303; font-family:'Outfit',sans-serif; color:#e4e4e7; }
        h1,h2,h3 { font-family:'Playfair Display',serif; }
        .glass { background:rgba(20,20,20,0.6); backdrop-filter:blur(16px); border:1px solid rgba(255,255,255,0.07); }
        .glass-card { background:rgba(25,25,25,0.8); border:1px solid rgba(255,255,255,0.07); transition: transform 0.3s; }
        .glass-card:hover { transform: scale(1.01); }
        input { background:rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:10px 14px; color:white; width:100%; outline:none; text-align: center; }
        input:focus { border-color:#6366f1; }
        .status-pill { font-size:0.6rem; padding:4px 10px; border-radius:99px; font-weight:700; text-transform:uppercase; }
    </style>
</head>
<body class="min-h-screen">

    <!-- LOGIN -->
    <div id="login-screen" class="fixed inset-0 bg-zinc-950 flex items-center justify-center z-[999]">
        <div class="glass rounded-3xl p-10 w-full max-w-sm mx-4 border border-white/10 text-center">
            <h1 class="text-3xl font-heading text-white mb-2">Admin Panel</h1>
            <p class="text-indigo-400 text-sm mb-8">Acceso Restringido</p>
            <input id="login-pass" type="password" placeholder="Contraseña de Admin" class="mb-6">
            <button onclick="checkLogin()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-500 transition-colors">Ingresar</button>
            <p id="login-error" class="text-red-500 text-xs mt-4 hidden">Contraseña Incorrecta</p>
            <div class="mt-6 p-3 bg-indigo-900/30 border border-indigo-500/20 rounded-xl">
                <p class="text-indigo-300 text-xs mb-1">Contraseña de acceso:</p>
                <p class="text-white font-mono font-bold text-lg tracking-widest">globaltrade2026</p>
            </div>
        </div>
    </div>

    <!-- PANEL -->
    <div id="admin-panel" class="hidden">
        <nav class="glass border-b border-white/10 px-6 py-4 flex items-center justify-between sticky top-0 z-50">
            <h1 class="font-heading text-xl">GlobalTrade <span class="text-indigo-400">Admin</span></h1>
            <button onclick="logout()" class="text-xs bg-white/5 px-4 py-2 rounded-full border border-white/10 hover:bg-white/10">Salir</button>
        </nav>

        <div class="max-w-7xl mx-auto px-6 py-10">
            <div class="flex gap-8 mb-10 border-b border-white/5">
                <button class="pb-4 text-sm font-bold uppercase tracking-widest text-indigo-400 border-b-2 border-indigo-400">Gestión de Cobros</button>
            </div>

            <div id="orders-list" class="space-y-6"></div>
            <div id="orders-empty" class="hidden text-center py-20 text-zinc-600">
                <i class="fa-solid fa-receipt text-5xl mb-4 opacity-20"></i>
                <p>No hay órdenes pendientes en este momento.</p>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_PASS = 'globaltrade2026';

        function checkLogin() {
            const val = document.getElementById('login-pass').value;
            if(val === ADMIN_PASS) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                loadOrders();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        function logout() { location.reload(); }

        async function loadOrders() {
            try {
                const res = await fetch('/api/orders');
                const orders = await res.json();
                const container = document.getElementById('orders-list');
                const empty = document.getElementById('orders-empty');

                if(!orders || orders.length === 0) {
                    empty.classList.remove('hidden');
                    container.innerHTML = '';
                    return;
                }
                empty.classList.add('hidden');

                container.innerHTML = orders.map(o => `
                    <div class="glass-card rounded-2xl p-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                        <div class="flex-1">
                            <div class="flex items-center gap-4 mb-2">
                                <span class="text-zinc-500 font-mono text-sm">#${o.id}</span>
                                <span class="status-pill ${o.status === 'Aprobado' ? 'bg-green-500/20 text-green-400' : 'bg-yellow-500/20 text-yellow-400'}">
                                    ${o.status}
                                </span>
                            </div>
                            <h3 class="text-xl font-bold text-white mb-1">Pago desde ${o.bank}</h3>
                            <p class="text-zinc-400 text-sm">Ref: <strong class="text-white">${o.ref}</strong> • ${o.date}</p>
                        </div>
                        <div class="w-full md:w-auto flex flex-col items-end gap-2">
                            <p class="text-2xl font-heading text-indigo-400">$${o.total}</p>
                            ${o.status === 'Pendiente' ? `
                                <button onclick="approveOrder(${o.id})" class="bg-indigo-600 text-white px-6 py-2 rounded-lg text-sm font-bold hover:bg-green-600 transition-all">
                                    Aprobar Pago
                                </button>
                            ` : `<span class="text-xs text-green-500 font-bold">✓ Acceso Habilitado</span>`}
                        </div>
                    </div>
                `).join('');
            } catch(e) { console.error("Error cargando ordenes"); }
        }

        async function approveOrder(id) {
            if(!confirm('¿Confirmas que recibiste el pago en tu cuenta?')) return;
            const res = await fetch(\`/api/orders/\${id}/approve\`, { method: 'PATCH' });
            if(res.ok) { loadOrders(); }
        }

        document.getElementById('login-pass').addEventListener('keydown', e => { if(e.key === 'Enter') checkLogin(); });
        
        setInterval(() => {
            if(!document.getElementById('admin-panel').classList.contains('hidden')) loadOrders();
        }, 10000);
    </script>
</body>
</html>
